# ============================================================================
# 🚂 RAILWAY CONFIG — Bokoma Backend
# ============================================================================
# Railway détecte automatiquement le Dockerfile. Ce fichier sert à fixer
# la commande de démarrage et le healthcheck.
# ============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand   = "node ./src/server.js"
healthcheckPath  = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
